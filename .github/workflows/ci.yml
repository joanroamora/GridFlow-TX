name: Enterprise DevSecOps CI Pipeline

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - Feature1TestEnvERCOTApi

jobs:
  syntax-and-lint-validation:
    name: 1. Code Syntax & Linting Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Linters & Ansible
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black yamllint ansible-core
          pip install -r requirements.txt

      - name: Python Formatting Check (Black)
        run: black --check .

      - name: Python Syntax & Flake8 Linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: YAML Syntax Validation (Yamllint)
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/ ansible/


      - name: Ansible Playbook Syntax Verification
        run: ansible-playbook --syntax-check ansible/playbooks/setup-node.yml

      - name: Dockerfile Linting (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013

  python-sast-security:
    name: 2. Python SAST Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit SAST Scanner
        run: pip install bandit

      - name: Run Bandit Security Analysis
        run: bandit -r . -x ./.venv,./tests --severity-level medium --confidence-level medium

  terraform-devsecops:
    name: 3. Terraform Validation & IaC Security Scan (Checkov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov IaC Security Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: terraform
          output_format: cli
          soft_fail: true

  veracode-security-scan:
    name: 4. Veracode SAST & SCA Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Package Source Code for Veracode Scan
        run: |
          zip -r veracode-package.zip . -x "*.git*" "*.venv*" "terraform/.terraform*"

      - name: Veracode Pipeline Scan
        uses: veracode/veracode-pipeline-scan-action@v1.0.12
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: veracode-package.zip
          fail_build: false
        continue-on-error: true

      - name: Upload Veracode Scan Results Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-security-results
          path: results.json
          retention-days: 14

  docker-container-security:
    name: 5. Docker Build & Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gridflow-tx:ci-test
          load: true

      - name: Run Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gridflow-tx:ci-test'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
