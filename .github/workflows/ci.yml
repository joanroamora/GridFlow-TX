name: Enterprise DevSecOps CI Pipeline

on:
  pull_request:
    branches:
      - main
      - staging
      - Feature2
  push:
    branches:
      - main
      - Feature2
      - Feature1TestEnvERCOTApi

permissions:
  contents: read
  packages: write

jobs:
  syntax-and-lint-validation:
    name: 1. Code Syntax & Linting Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linters & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black yamllint ansible-core
          pip install -r requirements.txt

      - name: Python Formatting Check (Black)
        run: black --check .

      - name: Python Syntax & Flake8 Linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: YAML Syntax Validation (Yamllint)
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" .github/ ansible/

      - name: Ansible Playbook Syntax Verification
        run: |
          ansible-playbook --syntax-check ansible/playbooks/setup-node.yml
          ansible-playbook --syntax-check ansible/playbooks/deploy-app.yml

      - name: Dockerfile Linting (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013

  unit-tests-and-coverage:
    name: 2. Unit Testing & Coverage (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Pytest Suite with Coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term

      - name: Upload Test & Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage-results
          path: coverage.xml
          retention-days: 14

  python-sast-security:
    name: 3. Python SAST Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit SAST Scanner
        run: pip install bandit

      - name: Run Bandit Security Analysis
        run: bandit -r . -x ./.venv,./tests --severity-level medium --confidence-level medium

  dependency-sca-scan:
    name: 4. Dependency Vulnerability SCA Scan (Pip-Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pip-Audit
        run: pip install pip-audit

      - name: Run Dependency Audit Scan
        run: pip-audit -r requirements.txt || true

  terraform-devsecops:
    name: 5. Terraform Validation & IaC Security Scan (Checkov)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov IaC Security Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          directory: terraform
          output_format: cli
          soft_fail: true

  docker-build-and-ghcr-publish:
    name: 6. Docker Build & Publish Artifact to GitHub Container Registry (GHCR)
    runs-on: ubuntu-latest
    needs: [syntax-and-lint-validation, unit-tests-and-coverage, python-sast-security]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and Push Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-container-security:
    name: 7. Container Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build-and-ghcr-publish
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image for Trivy Vulnerability Scan
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: gridflow-tx:ci-scan
          load: true

      - name: Run Trivy Container Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gridflow-tx:ci-scan'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
