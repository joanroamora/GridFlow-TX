global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gridflow-red-metrics'
    static_configs:
      - targets: ['app:8000']

  - job_name: 'gridflow-app-streamlit'
    metrics_path: '/_stcore/metrics'
    static_configs:
      - targets: ['app:8501']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
