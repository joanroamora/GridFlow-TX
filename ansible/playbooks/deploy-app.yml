---
- name: Deploy GridFlow-TX Platform Gateway & LGTM Observability Stack to AWS EC2
  hosts: ec2_nodes
  become: yes
  tasks:
    - name: Ensure docker group exists
      group:
        name: docker
        state: present

    - name: Create application directory
      file:
        path: /opt/gridflow-tx
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0775'

    - name: Copy project files to EC2
      copy:
        src: "{{ item }}"
        dest: /opt/gridflow-tx/
        owner: ec2-user
        group: ec2-user
        mode: '0644'
      loop:
        - ../../app.py
        - ../../dashboard.py
        - ../../translations.py
        - ../../requirements.txt
        - ../../Dockerfile
        - ../../docker-compose.yml

    - name: Copy services module directory to EC2
      copy:
        src: ../../services
        dest: /opt/gridflow-tx/
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy observability stack directory to EC2
      copy:
        src: ../../observability
        dest: /opt/gridflow-tx/
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Build Docker image for GridFlow-TX Platform App
      command: docker build -t gridflow-gui .
      args:
        chdir: /opt/gridflow-tx

    - name: Launch LGTM Observability Stack and Application via Docker Compose
      command: docker-compose up -d
      args:
        chdir: /opt/gridflow-tx
