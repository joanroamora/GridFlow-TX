---
- name: Deploy GridFlow-TX Platform Gateway to AWS EC2
  hosts: ec2_nodes
  become: yes
  tasks:
    - name: Create application directory
      file:
        path: /opt/gridflow-tx
        state: directory
        owner: ec2-user
        group: docker
        mode: '0775'

    - name: Copy project files to EC2
      copy:
        src: "{{ item }}"
        dest: /opt/gridflow-tx/
        owner: ec2-user
        group: docker
        mode: '0644'
      loop:
        - ../../app.py
        - ../../dashboard.py
        - ../../translations.py
        - ../../requirements.txt
        - ../../Dockerfile
        - ../../docker-compose.yml

    - name: Copy services module directory to EC2
      copy:
        src: ../../services
        dest: /opt/gridflow-tx/
        owner: ec2-user
        group: docker
        mode: '0755'

    - name: Build Docker image for GridFlow-TX Platform
      command: docker build -t gridflow-gui .
      args:
        chdir: /opt/gridflow-tx

    - name: Stop existing container if running
      command: docker stop gridflow-dashboard
      failed_when: false

    - name: Remove existing container if present
      command: docker rm gridflow-dashboard
      failed_when: false

    - name: Launch GridFlow-TX container on AWS EC2
      command: docker run -d --name gridflow-dashboard -p 8501:8501 --restart unless-stopped gridflow-gui
